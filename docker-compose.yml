services:
  tradingagents:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - OPENCLAW_URL=${OPENCLAW_URL:-http://openclaw:18789}
      - OPENCLAW_HOOK_TOKEN=${OPENCLAW_HOOK_TOKEN:-}
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./tradingagents/templates:/home/appuser/app/tradingagents/templates:ro

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    ports:
      - "8000:8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
